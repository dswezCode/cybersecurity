<!DOCTYPE html>
<html>

  <head>
    <title>
      RockPaperScissors
    </title>
  </head>

  <body>

    <div>

      <p>
        Rock Paper Scissors
      </p>

      <button onclick="
        
        randomNumber = Math.random();

        //if comp chooses rock (you chose rock)
        if(randomNumber >= 0 && randomNumber < 1/3)
        {
          console.log('computer chose rock ==> tie');
        }
        //if comp chooses paper(you chose rock)
        else if(randomNumber >= 1/3 && randomNumber < 2/3)
        {
          console.log('computer chose paper ==> lose');
        }
        //if comp chooses scissors(you chose rock)
        else if(randomNumber >= 2/3 && randomNumber < 1)
        {
          console.log('computer chose scissors ==> won');
        }
       

      ">
        Rock
      </button>

      <button onclick="
      
        randomNumber = Math.random();
        
        //if comp chooses rock (you chose paper)
        if(randomNumber >= 0 && randomNumber < 1/3)
        {
          console.log('computer chose rock ==> won');
        }
        //if comp chooses paper(you chose paper)
        else if(randomNumber >= 1/3 && randomNumber < 2/3)
        {
          console.log('computer chose paper ==> tie');
        }
        //if comp chooses scissors(you chose paper)
        else if(randomNumber >= 2/3 && randomNumber < 1)
        {
          console.log('computer chose scissors ==> lose');
        }
      
      ">
        Paper
      </button>

      <button onclick="
      
        //if comp chooses rock (you chose scissors)
        if(randomNumber >= 0 && randomNumber < 1/3)
        {
          console.log('computer chose rock ==> lose');
        }
        //if comp chooses paper(you chose scissors)
        else if(randomNumber >= 1/3 && randomNumber < 2/3)
        {
          console.log('computer chose paper ==> won');
        }
        //if comp chooses scissors(you chose scissors)
        else if(randomNumber >= 2/3 && randomNumber < 1)
        {
          console.log('computer chose scissors ==> tie');
        }

      ">
        Scissors
      </button>

    </div>

  </body>

</html>
